[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests/python"]

[tool.ruff]
line-length = 120
include = ["*.py", "*.pyw"]
exclude = ["tools/", "openpnp/", "tests/", "node_modules/", ".claude/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"app.pyw" = ["E402", "F841", "I001"]
