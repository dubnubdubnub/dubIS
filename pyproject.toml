[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests/python"]
markers = [
    "slow: marks tests as slow (spawn real GUI app, need display)",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402", "F841", "I001"]
