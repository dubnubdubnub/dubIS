name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  js-ubuntu:
    name: JS Lint & Test (Ubuntu)
    runs-on: [self-hosted, pnp-testbox]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx playwright install chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-ubuntu
          path: test-results/

  js-macos:
    name: JS Lint & Test (macOS)
    runs-on: [self-hosted, m4-air]
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-macos
          path: test-results/

  python-ubuntu:
    name: Python Lint & Test (Ubuntu)
    runs-on: [self-hosted, pnp-testbox]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - run: ~/dubis-venv/bin/ruff check inventory_api.py app.py digikey_client.py lcsc_client.py categorize.py pnp_server.py
      - run: ~/dubis-venv/bin/pytest tests/python/ -v

  python-macos:
    name: Python Lint & Test (macOS)
    runs-on: [self-hosted, m4-air]
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Lint
        run: ~/dubis-venv/bin/ruff check inventory_api.py app.py digikey_client.py lcsc_client.py categorize.py pnp_server.py
      - name: Test
        run: ~/dubis-venv/bin/pytest tests/python/ -v

  pnp-e2e:
    name: PnP End-to-End Test
    runs-on: [self-hosted, pnp-testbox]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py

  pnp-e2e-macos:
    name: PnP End-to-End Test (macOS)
    runs-on: [self-hosted, m4-air]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py
