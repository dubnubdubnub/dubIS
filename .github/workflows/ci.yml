name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run (all, js, python, pnp-e2e, pnp-cross)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - js
          - python
          - pnp-e2e
          - pnp-cross

jobs:
  js-ubuntu:
    name: JS Lint & Test (Ubuntu)
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'js'
    runs-on: [self-hosted, pnp-testbox]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx playwright install chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-ubuntu
          path: test-results/

  js-macos:
    name: JS Lint & Test (macOS)
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'js'
    runs-on: [self-hosted, m4-air]
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-macos
          path: test-results/

  python-ubuntu:
    name: Python Lint & Test (Ubuntu)
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'python'
    runs-on: [self-hosted, pnp-testbox]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - run: ~/dubis-venv/bin/ruff check inventory_api.py app.py digikey_client.py lcsc_client.py categorize.py pnp_server.py mouser_client.py
      - name: Verify generated test fixtures are up to date
        run: ~/dubis-venv/bin/python scripts/generate-test-fixtures.py --check
      - run: ~/dubis-venv/bin/pytest tests/python/ -v

  python-macos:
    name: Python Lint & Test (macOS)
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'python'
    runs-on: [self-hosted, m4-air]
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Lint
        run: ~/dubis-venv/bin/ruff check inventory_api.py app.py digikey_client.py lcsc_client.py categorize.py pnp_server.py mouser_client.py
      - name: Verify generated test fixtures are up to date
        run: ~/dubis-venv/bin/python scripts/generate-test-fixtures.py --check
      - name: Test
        run: ~/dubis-venv/bin/pytest tests/python/ -v

  pnp-e2e:
    name: PnP End-to-End Test
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pnp-e2e'
    runs-on: [self-hosted, pnp-testbox]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py

  pnp-e2e-macos:
    name: PnP End-to-End Test (macOS)
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pnp-e2e'
    runs-on: [self-hosted, m4-air]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py

  pnp-e2e-cross-ux430-to-mac:
    name: PnP E2E Cross-Compute (ux430 → m4-air)
    needs: [pnp-e2e, pnp-e2e-macos]
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pnp-cross'
    runs-on: [self-hosted, pnp-testbox]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp m4-air

  pnp-e2e-cross-mac-to-ux430:
    name: PnP E2E Cross-Compute (m4-air → ux430)
    needs: [pnp-e2e, pnp-e2e-macos]
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pnp-cross'
    runs-on: [self-hosted, m4-air]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp ux430
