name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run (all, lint, js, python, pnp-e2e, pnp-cross, quality)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - lint
          - js
          - python
          - pnp-e2e
          - pnp-cross
          - quality
          - visual-baselines

# Cancel superseded PR runs; push/dispatch runs get unique groups so they never conflict
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name != 'pull_request' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier routing ─────────────────────────────────────────────────────
  parse-tags:
    name: Parse CI tier
    runs-on: ubuntu-latest
    outputs:
      run_lint:    ${{ steps.resolve.outputs.run_lint }}
      run_js:      ${{ steps.resolve.outputs.run_js }}
      run_python:  ${{ steps.resolve.outputs.run_python }}
      run_pnp:     ${{ steps.resolve.outputs.run_pnp }}
      run_cross:   ${{ steps.resolve.outputs.run_cross }}
      run_quality: ${{ steps.resolve.outputs.run_quality }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: resolve
        run: |
          set_all() {
            echo "run_lint=true"    >> "$GITHUB_OUTPUT"
            echo "run_js=true"      >> "$GITHUB_OUTPUT"
            echo "run_python=true"  >> "$GITHUB_OUTPUT"
            echo "run_pnp=true"     >> "$GITHUB_OUTPUT"
            echo "run_cross=true"   >> "$GITHUB_OUTPUT"
            echo "run_quality=true" >> "$GITHUB_OUTPUT"
          }
          set_none() {
            for f in run_lint run_js run_python run_pnp run_cross run_quality; do
              echo "$f=false" >> "$GITHUB_OUTPUT"
            done
          }

          # --- 0. SECURITY: never run self-hosted CI for fork PRs ---
          #   dubIS is a public repo with self-hosted runners (cluster on the
          #   home LAN). A fork PR must NOT execute on our hardware. All the
          #   self-hosted jobs gate on these run_* flags, so zeroing them makes
          #   every self-hosted job skip. parse-tags itself runs on GitHub-hosted
          #   ubuntu and only reads metadata (never the PR's code), so this is safe.
          #   To run full CI on a trusted fork PR: push the branch into this repo.
          if [[ "${{ github.event_name }}" == "pull_request" \
                && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "::notice::Fork PR detected — self-hosted CI skipped. A maintainer must review and push the branch into the repo to run full CI."
            set_none
            exit 0
          fi

          # --- 1. Push to main always runs everything (squash-merge commits
          #        inherit ci tags from PR branches — ignore them on main) ---
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Push to main → all suites"
            set_all
            exit 0
          fi

          KNOWN="all lint js python pnp-e2e pnp-cross quality"

          # --- 2. Read commit message tag ---
          TAG=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.suite }}"
          else
            MSG=$(git log -1 --pretty=%B "${{ github.event.pull_request.head.sha }}")
            TAG=$(echo "$MSG" | grep -oP '\[ci:\s*\K[a-z-]+(?=\])' | head -1)
          fi

          # Ignore unknown tag values (avoids false matches from prose)
          if [[ -n "$TAG" ]] && [[ " $KNOWN " != *" $TAG "* ]]; then
            echo "Ignoring unknown tag: $TAG"
            TAG=""
          fi

          # --- 3. Explicit tag → set flags directly ---
          if [[ -n "$TAG" ]]; then
            echo "Explicit tag: $TAG"
            case "$TAG" in
              all)
                set_all ;;
              lint)
                echo "run_lint=true" >> "$GITHUB_OUTPUT" ;;
              js)
                echo "run_lint=true" >> "$GITHUB_OUTPUT"
                echo "run_js=true"   >> "$GITHUB_OUTPUT" ;;
              python)
                echo "run_lint=true"   >> "$GITHUB_OUTPUT"
                echo "run_python=true" >> "$GITHUB_OUTPUT" ;;
              pnp-e2e)
                echo "run_pnp=true" >> "$GITHUB_OUTPUT" ;;
              pnp-cross)
                echo "run_pnp=true"   >> "$GITHUB_OUTPUT"
                echo "run_cross=true" >> "$GITHUB_OUTPUT" ;;
              quality)
                echo "run_lint=true"    >> "$GITHUB_OUTPUT"
                echo "run_quality=true" >> "$GITHUB_OUTPUT" ;;
            esac
            exit 0
          fi

          # --- 4. PR with no tag → auto-detect from changed files ---
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            FILES=$(git diff --name-only "$BASE" "$HEAD")
          else
            # workflow_dispatch without explicit tag (shouldn't happen, but safe)
            set_all
            exit 0
          fi

          echo "Changed files:"
          echo "$FILES"
          echo "---"

          JS=false PY=false PNP=false QUALITY=false

          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            case "$f" in
              js/*|css/*|index.html)                    JS=true; QUALITY=true ;;
              package.json|package-lock.json)            JS=true ;;
              tsconfig.json|eslint.config.*)             JS=true ;;
              vitest.config.*|playwright.config.*)       JS=true; QUALITY=true ;;
              tests/js/*|tests/e2e*|tests/fixtures/*)    JS=true ;;
              pnp_server.py|tests/pnp-e2e/*)            PNP=true; PY=true ;;
              openpnp/*|tests/openpnp-config/*)          PNP=true ;;
              *.py|requirements*.txt)                    PY=true ;;
              tests/python/*)                            PY=true ;;
              scripts/*.py)                              PY=true ;;
              data/constants.json)                       JS=true ;;
              .github/*)                                 JS=true; PY=true; PNP=true; QUALITY=true ;;
              # docs, CLAUDE.md, data/preferences.json, etc. → lint only
            esac
          done <<< "$FILES"

          # Always run lint
          echo "run_lint=true" >> "$GITHUB_OUTPUT"

          # If nothing matched any pattern, run all as a safety net
          if ! $JS && ! $PY && ! $PNP && ! $QUALITY; then
            MATCHED=false
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              case "$f" in
                *.md|*.txt|*.json|data/*|CLAUDE.md|.gitignore|LICENSE) MATCHED=true ;;
              esac
            done <<< "$FILES"
            if ! $MATCHED; then
              echo "Unknown file types changed → all suites"
              set_all
              exit 0
            fi
          fi

          $JS      && echo "run_js=true"      >> "$GITHUB_OUTPUT"
          $PY      && echo "run_python=true"   >> "$GITHUB_OUTPUT"
          $PNP     && echo "run_pnp=true"      >> "$GITHUB_OUTPUT"
          $QUALITY && echo "run_quality=true"   >> "$GITHUB_OUTPUT"
          # Cross-compute only runs with explicit [ci: pnp-cross] or [ci: all]

          echo "Resolved: lint=true js=$JS python=$PY pnp=$PNP quality=$QUALITY cross=false"

  guard:
    name: Branch guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check for already-merged PR on this branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MERGED=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.head_ref }}" \
            --state merged \
            --json number,url \
            --jq '.[0].url // empty')
          if [[ -n "$MERGED" ]]; then
            echo "::error::This branch already has a merged PR: $MERGED"
            echo "::error::Create a new branch from origin/main instead."
            echo "::error::Use: bash scripts/push-pr.sh (it handles this automatically)"
            exit 1
          fi

  # ── JS: lint + type-check + unit tests ───────────────────────────────
  #   E2E is split into js-e2e (functional, sharded) and js-live (live
  #   backend) so they run on separate runners in parallel instead of
  #   serially inside one job. The js-required gate below aggregates all
  #   three back into the single protected "JS Lint & Test (ubuntu)" check.
  js:
    name: JS Lint & Type (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      (needs.parse-tags.outputs.run_lint == 'true' || needs.parse-tags.outputs.run_js == 'true')
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: arc-dubis
            checkout-clean: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - name: Unit tests
        if: needs.parse-tags.outputs.run_js == 'true'
        run: npx vitest run --project core

  # ── JS: functional E2E (runs parallel to js-live on a separate runner) ─
  #   Not sharded: the suite's wall-time is dominated by a handful of slow
  #   specs, so count-based --shard just piles them into one imbalanced
  #   shard (measured ~2x the other) while doubling the job count and the
  #   queue pressure on the 4-runner boxes. One unsharded job per OS, run
  #   in parallel with js-live, is the actual win here.
  js-e2e:
    name: JS Functional E2E (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_js == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: arc-dubis
            checkout-clean: true
            install-pw: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
            install-pw: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: npm install
      - name: Install Playwright browsers
        if: matrix.install-pw
        run: npx playwright install chromium
      - name: Functional E2E
        run: npx playwright test --project functional
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.name }}-functional
          path: test-results/

  # ── JS: live-backend E2E (Linux only; serialized via playwright config) ─
  js-live:
    name: JS Live-backend E2E (ubuntu)
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_js == 'true'
    runs-on: arc-dubis
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - run: npm install
      - run: npx playwright install chromium
      - name: Install Python deps for live E2E
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Live-backend E2E
        # Single-worker isolation is pinned in playwright.config.mjs (live project).
        run: npx playwright test --project live
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-live
          path: test-results/

  # ── JS on Windows (win11 VM): lint/type/unit + functional E2E ────────
  #   dubIS ships on Windows (pywebview/WebView2), so this leg exercises the
  #   frontend on a real Windows runner — catching Windows-only path/render
  #   issues the ubuntu+macos legs miss. Runs on the single self-hosted win11
  #   VM (blhx370/KVM). Deliberately NOT part of the js-required gate: it's a
  #   single VM, so an outage must not block merges. Gated on run_js.
  js-windows:
    name: JS Windows E2E (win11)
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_js == 'true'
    runs-on: [self-hosted, win11]
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run --project core
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Functional E2E
        run: npx playwright test --project functional
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-win11-functional
          path: test-results/

  # ── Required-check gate ──────────────────────────────────────────────
  #   Keeps the "JS Lint & Test (ubuntu)" context that branch protection
  #   requires, now aggregating the split JS jobs so a failure in lint/type,
  #   any functional shard, or live E2E blocks merge. Always runs (so non-JS
  #   PRs still report this context) and treats skipped jobs as a pass.
  js-required:
    name: JS Lint & Test (ubuntu)
    needs: [parse-tags, guard, js, js-e2e, js-live]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate JS job results
        run: |
          echo "parse-tags          = ${{ needs.parse-tags.result }}"
          echo "guard               = ${{ needs.guard.result }}"
          echo "js (lint/type/unit) = ${{ needs.js.result }}"
          echo "js-e2e (functional) = ${{ needs.js-e2e.result }}"
          echo "js-live             = ${{ needs.js-live.result }}"
          for r in \
            "${{ needs.parse-tags.result }}" \
            "${{ needs.guard.result }}" \
            "${{ needs.js.result }}" \
            "${{ needs.js-e2e.result }}" \
            "${{ needs.js-live.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A required JS job did not pass (result: $r)"
              exit 1
            fi
          done
          echo "All required JS jobs passed or were skipped."

  # ── Python: lint + unit tests ─────────────────────────────────────────
  python:
    name: Python Lint & Test (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      (needs.parse-tags.outputs.run_lint == 'true' || needs.parse-tags.outputs.run_python == 'true')
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: arc-dubis
            checkout-clean: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - run: ~/dubis-venv/bin/ruff check .
      - name: Verify generated test fixtures are up to date
        # Also run on JS-only changes: the JS tier consumes these committed fixtures,
        # so a stale fixture must not pass CI even when no Python files changed. This
        # job already runs on JS changes (gated on run_lint, always true) and has the
        # venv installed, so this is the authoritative guard for the JS-only hole.
        if: needs.parse-tags.outputs.run_python == 'true' || needs.parse-tags.outputs.run_js == 'true'
        run: ~/dubis-venv/bin/python scripts/generate-test-fixtures.py --check
      - name: Verify code map is up to date
        if: needs.parse-tags.outputs.run_python == 'true'
        run: ~/dubis-venv/bin/python scripts/gen-code-map.py --check
      - name: Verify module manifests are accurate
        if: needs.parse-tags.outputs.run_python == 'true'
        run: ~/dubis-venv/bin/python scripts/check-manifests.py
      - name: Guard against new hard-coded px layout values
        if: needs.parse-tags.outputs.run_python == 'true'
        run: ~/dubis-venv/bin/python scripts/check-layout-tokens.py --check
      - name: Unit tests
        if: needs.parse-tags.outputs.run_python == 'true'
        run: ~/dubis-venv/bin/pytest tests/python/ -v

  # ── VLM image-recognition smoke test (GPU node only) ─────────────────
  #   Exercises the local Ollama VLM (qwen2.5vl, auto-selected by GPU VRAM) on
  #   the single self-hosted GPU runner (y740 / RTX 2060). Like js-windows this
  #   is a single-box leg: gated on run_python and deliberately NOT part of any
  #   required gate, so a GPU-node outage can't block merges. The `gpu`-marked
  #   test is deselected from the regular python tier (no Ollama there).
  vlm-gpu:
    name: VLM Image-Recognition (GPU)
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_python == 'true'
    runs-on: [self-hosted, gpu]
    timeout-minutes: 15
    env:
      # The runner pod reaches the GPU node's Ollama via the cluster Service, and
      # pins the model to the tag Ollama serves on the RTX 2060. (VRAM-based
      # auto-selection — which reads the GPU node's local nvidia-smi — is covered
      # by unit tests; the runner pod has no GPU of its own to probe.)
      DUBIS_OLLAMA_URL: http://ollama.win-runners.svc.cluster.local:11434
      DUBIS_VLM_MODEL: qwen2.5vl:3b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q -r requirements-dev.txt
      - name: VLM live smoke test (real Ollama on the RTX 2060)
        run: pytest tests/python/test_vlm_gpu.py -m gpu -v

  # ── Tier 2: Functional (PnP E2E tests) ──────────────────────────────
  pnp-e2e:
    name: PnP End-to-End Test (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_pnp == 'true'
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: arc-dubis
          - name: macos
            runner: [self-hosted, m4-air, gui]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py

  pnp-e2e-cross-ux430-to-mac:
    name: PnP E2E Cross-Compute (ux430 -> m4-air)
    needs: [parse-tags, guard, pnp-e2e]
    # TEMP-DISABLED 2026-06-13: regressed (remote OpenPnP exits 1) amid the
    # OpenPnP→handheld migration + ux430 joining k3s. Re-enable by restoring the
    # run_cross gate once the cross-compute path is fixed.
    if: false
    runs-on: [self-hosted, pnp-testbox, gui]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp m4-air

  pnp-e2e-cross-mac-to-ux430:
    name: PnP E2E Cross-Compute (m4-air -> ux430)
    needs: [parse-tags, guard, pnp-e2e]
    # TEMP-DISABLED 2026-06-13: see pnp-e2e-cross-ux430-to-mac above. Re-enable
    # by restoring the run_cross gate once the cross-compute path is fixed.
    if: false
    runs-on: [self-hosted, m4-air, gui]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp ux430

  # ── Tier 3: Quality (non-blocking) ──────────────────────────────────
  quality:
    name: Quality Tests (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      needs.parse-tags.outputs.run_quality == 'true'
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: arc-dubis
            checkout-clean: true
            install-pw: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
            install-pw: false
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: npm install
      - name: Install Playwright browsers
        if: matrix.install-pw
        run: npx playwright install chromium
      - name: Quality unit tests (contrast, style-audit, ui-helpers)
        run: npx vitest run --project quality
      - name: Quality E2E (accessibility, resize-visibility)
        run: npx playwright test --project quality

  # ── Visual baseline regeneration (dispatch-only) ─────────────────────
  update-visual-baselines:
    name: Update visual baselines (Linux)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'visual-baselines'
    runs-on: arc-dubis
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npx playwright install chromium
      - name: Regenerate visual baselines
        run: npx playwright test inv-alignment-visual sticky-clip-visual --project functional --update-snapshots
      - uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: tests/js/e2e/**/*-linux.png
