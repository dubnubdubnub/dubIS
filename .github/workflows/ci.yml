name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run (all, lint, js, python, pnp-e2e, pnp-cross, quality)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - lint
          - js
          - python
          - pnp-e2e
          - pnp-cross
          - quality

jobs:
  # ── Tier routing ─────────────────────────────────────────────────────
  parse-tags:
    name: Parse CI tier
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.parse.outputs.tier }}
    steps:
      - uses: actions/checkout@v4
        with:
          # PR events checkout a merge commit; fetch enough to read the branch head
          fetch-depth: 2
      - id: parse
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tier=${{ github.event.inputs.suite }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR checkout is a merge commit — read the actual branch head
            MSG=$(git log -1 --pretty=%B "${{ github.event.pull_request.head.sha }}")
            TAG=$(echo "$MSG" | grep -oP '\[ci:\s*\K[a-z-]+(?=\])' | head -1)
            echo "tier=${TAG:-all}" >> "$GITHUB_OUTPUT"
          else
            MSG=$(git log -1 --pretty=%B)
            TAG=$(echo "$MSG" | grep -oP '\[ci:\s*\K[a-z-]+(?=\])' | head -1)
            echo "tier=${TAG:-all}" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tier: $(grep tier "$GITHUB_OUTPUT" | tail -1)"

  guard:
    name: Branch guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check for already-merged PR on this branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MERGED=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.head_ref }}" \
            --state merged \
            --json number,url \
            --jq '.[0].url // empty')
          if [[ -n "$MERGED" ]]; then
            echo "::error::This branch already has a merged PR: $MERGED"
            echo "::error::Create a new branch from origin/main instead."
            echo "::error::Use: bash scripts/push-pr.sh (it handles this automatically)"
            exit 1
          fi

  # ── JS: lint + type-check + unit tests + E2E ─────────────────────────
  js:
    name: JS Lint & Test (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","js","lint"]'), needs.parse-tags.outputs.tier)
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: [self-hosted, pnp-testbox]
            checkout-clean: true
            install-pw: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
            install-pw: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: npm install
      - run: npx eslint js/
      - run: npx tsc --noEmit
      - name: Unit tests
        if: contains(fromJSON('["all","js"]'), needs.parse-tags.outputs.tier)
        run: npx vitest run --project core
      - name: Install Playwright browsers
        if: >-
          matrix.install-pw &&
          contains(fromJSON('["all","js"]'), needs.parse-tags.outputs.tier)
        run: npx playwright install chromium
      - name: Playwright E2E
        if: contains(fromJSON('["all","js"]'), needs.parse-tags.outputs.tier)
        run: npx playwright test --project functional
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.name }}
          path: test-results/

  # ── Python: lint + unit tests ─────────────────────────────────────────
  python:
    name: Python Lint & Test (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","python","lint"]'), needs.parse-tags.outputs.tier)
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: [self-hosted, pnp-testbox]
            checkout-clean: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - run: ~/dubis-venv/bin/ruff check .
      - name: Verify generated test fixtures are up to date
        if: contains(fromJSON('["all","python"]'), needs.parse-tags.outputs.tier)
        run: ~/dubis-venv/bin/python scripts/generate-test-fixtures.py --check
      - name: Unit tests
        if: contains(fromJSON('["all","python"]'), needs.parse-tags.outputs.tier)
        run: ~/dubis-venv/bin/pytest tests/python/ -v

  # ── Tier 2: Functional (E2E tests) ──────────────────────────────────
  pnp-e2e:
    name: PnP End-to-End Test (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","pnp-e2e","pnp-cross"]'), needs.parse-tags.outputs.tier)
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: [self-hosted, pnp-testbox]
          - name: macos
            runner: [self-hosted, m4-air]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py

  pnp-e2e-cross-ux430-to-mac:
    name: PnP E2E Cross-Compute (ux430 -> m4-air)
    needs: [parse-tags, guard, pnp-e2e]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","pnp-cross"]'), needs.parse-tags.outputs.tier)
    runs-on: [self-hosted, pnp-testbox]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp m4-air

  pnp-e2e-cross-mac-to-ux430:
    name: PnP E2E Cross-Compute (m4-air -> ux430)
    needs: [parse-tags, guard, pnp-e2e]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","pnp-cross"]'), needs.parse-tags.outputs.tier)
    runs-on: [self-hosted, m4-air]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run cross-compute PnP E2E
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py --remote-openpnp ux430

  # ── Tier 3: Quality (non-blocking) ──────────────────────────────────
  quality:
    name: Quality Tests (${{ matrix.name }})
    needs: [parse-tags, guard]
    if: >-
      always() && !failure() &&
      contains(fromJSON('["all","quality"]'), needs.parse-tags.outputs.tier)
    strategy:
      matrix:
        include:
          - name: ubuntu
            runner: [self-hosted, pnp-testbox]
            checkout-clean: true
            install-pw: true
          - name: macos
            runner: [self-hosted, m4-air]
            checkout-clean: false
            install-pw: false
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          clean: ${{ matrix.checkout-clean }}
      - run: npm install
      - name: Install Playwright browsers
        if: matrix.install-pw
        run: npx playwright install chromium
      - name: Quality unit tests (contrast, style-audit, ui-helpers)
        run: npx vitest run --project quality
      - name: Quality E2E (accessibility, resize-visibility)
        run: npx playwright test --project quality

