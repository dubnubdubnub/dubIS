name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  js:
    name: JS Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx eslint js/
      - run: npx vitest run
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/

  python:
    name: Python Lint & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check inventory_api.py app.py digikey_client.py lcsc_client.py categorize.py pnp_server.py
      - run: pytest tests/python/ -v

  pnp-e2e:
    name: PnP End-to-End Test
    runs-on: [self-hosted, pnp-testbox]
    timeout-minutes: 5
    env:
      OPENPNP_BIN: /usr/local/bin/openpnp.sh
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: ~/dubis-venv/bin/pip install -r requirements-dev.txt
      - name: Run PnP E2E tests
        run: ~/dubis-venv/bin/python tests/pnp-e2e/run_test.py
