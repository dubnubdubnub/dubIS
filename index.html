<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dubIS</title>
<link rel="icon" href="data/dubIS.png" type="image/png">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/tables.css">
<link rel="stylesheet" href="css/modals.css">
<link rel="stylesheet" href="css/panels/import.css">
<link rel="stylesheet" href="css/panels/inventory.css">
<link rel="stylesheet" href="css/panels/bom.css">
<link rel="stylesheet" href="css/panels/group-flyout.css">
<link rel="stylesheet" href="css/components/toast.css">
<link rel="stylesheet" href="css/components/tooltip.css">
<link rel="stylesheet" href="css/components/badges.css">
<link rel="stylesheet" href="css/components/console.css">
<link rel="stylesheet" href="css/components/linking.css">
<link rel="stylesheet" href="css/components/vendor.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="btn-md prefs-btn" id="prefs-btn">Preferences</button>
  </div>
  <div class="header-center">
    <button class="btn-md header-btn" id="global-undo" title="Undo" disabled>&#x21A9;</button>
    <button class="btn-md header-btn" id="global-redo" title="Redo" disabled>&#x21AA;</button>
  </div>
  <div class="header-right">
    <span class="inv-count" id="inv-count"></span>
    <span class="inv-total-value" id="inv-total-value"></span>
  </div>
</div>

<div class="panels">
  <!-- Left Panel: Purchase Import -->
  <div class="panel panel-import" id="panel-import">
    <div class="panel-header">Purchase Import</div>
    <div class="panel-body" id="import-body"></div>
    <div id="console-log">
      <div class="console-header">
        <span>Log</span>
        <button id="console-clear" title="Clear">&times;</button>
      </div>
      <div class="console-entries" id="console-entries"></div>
    </div>
  </div>

  <!-- Middle Panel: Inventory Viewer -->
  <div class="panel panel-inventory" id="panel-inventory">
    <div class="panel-header">
      Inventory
      <button class="btn-md rebuild-btn" id="rebuild-inv" title="Rebuild Inventory">Rebuild Inventory</button>
      <div class="inv-search-group">
        <input type="text" class="search-input" id="inv-search" placeholder="Search parts...">
        <button class="clear-filters-btn" id="clear-dist-filter" disabled title="Clear Filters"><span class="clear-label">Clear Filters</span><span class="clear-icon">&#x2715;</span></button>
        <div class="dist-filter-bar" id="dist-filter-bar">
          <button class="dist-filter-btn" data-distributor="lcsc" title="LCSC"><img class="vendor-icon" src="data/lcsc-icon.ico"><span class="dist-label">LCSC</span></button>
          <button class="dist-filter-btn" data-distributor="digikey" title="Digikey"><img class="vendor-icon" src="data/digikey-icon.png"><span class="dist-label">Digikey</span></button>
          <button class="dist-filter-btn" data-distributor="mouser" title="Mouser"><img class="vendor-icon" src="data/mouser-icon.svg"><span class="dist-label">Mouser</span></button>
          <button class="dist-filter-btn" data-distributor="pololu" title="Pololu"><img class="vendor-icon" src="data/pololu-icon.svg"><span class="dist-label">Pololu</span></button>
          <button class="dist-filter-btn" data-distributor="other" title="Other"><span class="dist-icon-other">?</span><span class="dist-label">Other</span></button>
        </div>
      </div>
    </div>
    <div class="panel-body" id="inventory-body"></div>
  </div>
  <div class="flyout-container" id="flyout-container"></div>

  <!-- Right Panel: BOM Comparison -->
  <div class="panel panel-bom" id="panel-bom">
    <div class="panel-header">BOM Comparison</div>
    <div class="panel-body" id="bom-body"></div>
  </div>
</div>

<!-- Adjustment Modal -->
<div class="modal-overlay hidden" id="adjust-modal">
  <div class="modal modal-wide">
    <div class="modal-title" id="modal-title"></div>
    <table class="modal-detail-table" id="modal-detail-table"></table>
    <div class="modal-divider"></div>
    <div class="modal-form">
      <select id="adj-type">
        <option value="set">Set to</option>
        <option value="add">Add</option>
        <option value="remove">Remove</option>
      </select>
      <input type="number" id="adj-qty" min="0" step="1" value="0">
    </div>
    <div class="modal-form">
      <label for="adj-note">Note:</label>
      <input type="text" id="adj-note" placeholder="Reason for adjustment">
    </div>
    <div class="modal-divider"></div>
    <div class="modal-form">
      <label for="adj-unit-price">Unit Price ($):</label>
      <input type="number" id="adj-unit-price" min="0" step="0.01" placeholder="—">
    </div>
    <div class="modal-form">
      <label for="adj-ext-price">Ext. Price ($):</label>
      <input type="number" id="adj-ext-price" min="0" step="0.01" placeholder="—">
    </div>
    <div class="modal-actions">
      <button class="btn-lg btn btn-cancel" id="adj-cancel">Cancel</button>
      <button class="btn-lg btn btn-apply" id="adj-apply">Apply</button>
    </div>
  </div>
</div>

<!-- Consume Confirmation Modal -->
<div class="modal-overlay hidden" id="consume-modal">
  <div class="modal">
    <div class="modal-title" id="consume-title">Consume BOM Parts</div>
    <div class="modal-subtitle" id="consume-subtitle"></div>
    <div class="modal-form">
      <label for="consume-note">Note:</label>
      <input type="text" id="consume-note" placeholder="Build batch note (optional)">
    </div>
    <div class="modal-actions">
      <button class="btn-lg btn btn-cancel" id="consume-cancel">Cancel</button>
      <button class="btn-lg btn btn-apply" id="consume-confirm">Consume</button>
    </div>
  </div>
</div>

<!-- Preferences Modal -->
<div class="modal-overlay hidden" id="prefs-modal">
  <div class="modal prefs-modal-wide">
    <div class="modal-title">Preferences</div>
    <div class="modal-subtitle">Qty color reflects stock dollar value (qty &times; unit price). Adjust the green threshold per category.</div>
    <div class="prefs-sliders" id="prefs-sliders"></div>
    <div class="modal-divider"></div>
    <div class="modal-subtitle" style="margin-bottom:4px"><strong>Digikey</strong></div>
    <div class="modal-form" style="justify-content:space-between">
      <span id="dk-status" style="font-size:12px;color:var(--text-muted)"></span>
      <div style="display:flex;gap:6px">
        <button class="btn-lg btn btn-apply" id="dk-login" style="padding:4px 14px;font-size:12px">Login to Digikey</button>
        <button class="btn-lg btn btn-cancel hidden" id="dk-logout" style="padding:4px 14px;font-size:12px">Logout</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-lg btn btn-cancel" id="prefs-cancel">Cancel</button>
      <button class="btn-lg btn btn-apply" id="prefs-save">Save</button>
    </div>
  </div>
</div>

<!-- Price Modal -->
<div class="modal-overlay hidden" id="price-modal">
  <div class="modal">
    <div class="modal-title" id="price-modal-title"></div>
    <div class="modal-subtitle" id="price-modal-subtitle"></div>
    <div class="modal-form">
      <label for="price-unit">Unit Price ($):</label>
      <input type="number" id="price-unit" min="0" step="0.01">
    </div>
    <div class="modal-form">
      <label for="price-ext">Ext. Price ($):</label>
      <input type="number" id="price-ext" min="0" step="0.01">
    </div>
    <div class="modal-actions">
      <button class="btn-lg btn btn-cancel" id="price-cancel">Cancel</button>
      <button class="btn-lg btn btn-apply" id="price-apply">Save</button>
    </div>
  </div>
</div>

<!-- Close Confirmation Modal -->
<div class="modal-overlay hidden" id="close-modal">
  <div class="modal">
    <div class="modal-title">Unsaved Changes</div>
    <div class="modal-subtitle">Your BOM has unsaved changes. What would you like to do?</div>
    <div class="modal-actions">
      <button class="btn-lg btn btn-cancel" id="close-cancel">Cancel</button>
      <button class="btn-lg btn btn-danger" id="close-discard">Discard &amp; Close</button>
      <button class="btn-lg btn btn-apply" id="close-save">Save &amp; Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module" src="js/app-init.js"></script>
</body>
</html>
